# Render Blueprint — deploy locAIte as a free Docker web service.
# Import this repo at https://dashboard.render.com/blueprints and Render will
# read this file automatically.
#
# NOTE: the free plan provides 512 MB RAM. TensorFlow + FaceNet are memory-heavy
# and may exceed that on the free tier; if the service OOMs on boot, upgrade to a
# paid instance (>= 2 GB) or deploy to a host with more free RAM.
services:
  - type: web
    name: locaite
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: APP_ENV
        value: production
      # Secrets auto-generate on boot if unset. Set these in the Render dashboard
      # for stable tokens/logins across restarts.
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false   # set your own value in the dashboard
