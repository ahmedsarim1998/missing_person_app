<!DOCTYPE html>
<html lang="en">
<head>
  <title>Case Details - locAIte</title>
  <link rel="icon" href="images/icon.webp" type="image/gif" sizes="16x16">
  <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <link href="css/bootstrap.min.css" rel="stylesheet" type="text/css" id="bootstrap">
  <link href="css/plugins.css" rel="stylesheet" type="text/css">
  <link href="css/style.css" rel="stylesheet" type="text/css">
  <link id="colors" href="css/colors/scheme-1.css" rel="stylesheet" type="text/css">
  <style>
    .sighting-card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.12); border-radius: 12px; }
    .sighting-alert { background: #fff3cd; color: #5c4600; border-radius: 12px; }
    .sighting-alert strong { color: inherit; }
    .sighting-img { height: 120px; width: 120px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(0,0,0,.15); }
    #edit-msg .alert-danger { background: #f8d7da; color: #842029; border: 0; }
  </style>
</head>
<body>
  <div id="wrapper">
    <div id="site-header"></div>
    <div class="no-bottom no-top" id="content">
      <div id="top"></div>
      <section class="text-light" style="padding:160px 0 90px;background:var(--bg-dark-1);min-height:100vh">
        <div class="container">
          <a href="cases.html" class="text-light"><i class="icofont-rounded-left"></i> Back to all cases</a>
          <div id="detail" class="mt-4"><p>Loading…</p></div>
          <div id="sightings-panel" class="mt-5"></div>
        </div>
      </section>
    </div>
    <div id="site-footer"></div>
  </div>

  <script src="js/plugins.js"></script>
  <script src="js/app.js"></script>
  <script src="js/designesia.js"></script>
  <script>
    var id = new URLSearchParams(location.search).get("id");
    var detail = document.getElementById("detail");

    function thumbs(photos) {
      if (!photos || !photos.length) return "";
      return '<div class="row g-2 mt-2">' + photos.map(function (p) {
        return '<div class="col-3"><div style="height:90px;background:#111 url(\'' + p + '\') center/cover no-repeat;border-radius:6px"></div></div>';
      }).join("") + "</div>";
    }

    function render(c) {
      var img = c.photo_path || "images/misc/placeholder.jpg";
      var badge = c.status === "solved"
        ? '<span class="badge bg-success">Solved</span>'
        : '<span class="badge bg-danger">Active</span>';
      // "Last seen at" note: when + how the location was last updated.
      var locNote = "";
      if (c.last_location_updated_at) {
        var src = c.last_location_source === "facebook" ? "social-media sighting" : (c.last_location_source || "update");
        locNote = ' <span class="text-muted-light small d-block">updated ' +
          new Date(c.last_location_updated_at).toLocaleString() + " · " + esc(src) + "</span>";
      }

      // An admin, or the user who reported the case, may edit it.
      var canEdit = LOCAITE.isAdmin() || (c.reporter && LOCAITE.username() === c.reporter);
      // Reporter contact (alerts go here) — only shown to those who can edit.
      var contactRow = "";
      if (canEdit && (c.reporter_phone || c.reporter_email)) {
        contactRow = "<tr><th>Alerts sent to</th><td>" +
          esc([c.reporter_phone, c.reporter_email].filter(Boolean).join(" · ")) + "</td></tr>";
      }
      var controls = '<div class="mt-4 d-flex flex-wrap gap-2">';
      if (canEdit) controls += '<button id="edit-case" class="btn-main btn-line"><span>Edit details</span></button>';
      if (LOCAITE.isAdmin()) controls += '<button id="toggle-status" class="btn-main"><span>Mark as ' +
        (c.status === "solved" ? "Active" : "Solved") + "</span></button>";
      controls += "</div>";

      detail.innerHTML =
        '<div class="row g-4">' +
        '<div class="col-lg-5">' +
        '<div style="height:380px;background:#111 url(\'' + img + '\') center/cover no-repeat;border-radius:8px"></div>' +
        thumbs(c.photos) +
        "</div>" +
        '<div class="col-lg-7">' +
        '<div class="d-flex align-items-center mb-2"><h2 class="mb-0 me-3">' + esc(c.name || "Unknown") + "</h2>" + badge + "</div>" +
        '<table class="table table-dark table-borderless"><tbody>' +
        "<tr><th style='width:200px'>National ID</th><td>" + esc(c.national_id || "—") + "</td></tr>" +
        "<tr><th>Last seen at</th><td>" + esc(c.last_location || "—") + locNote + "</td></tr>" +
        "<tr><th>Identifiers</th><td>" + esc(c.identifiers || "—") + "</td></tr>" +
        "<tr><th>Status</th><td>" + esc(c.status) + "</td></tr>" +
        contactRow +
        "</tbody></table>" + controls +
        "</div></div>";

      var tbtn = document.getElementById("toggle-status");
      if (tbtn) tbtn.addEventListener("click", async function () {
        var next = c.status === "solved" ? "active" : "solved";
        try {
          await LOCAITE.apiPut("/api/cases/" + c.id + "/status", { status: next });
          load();
        } catch (err) { alert(err.message); }
      });
      var ebtn = document.getElementById("edit-case");
      if (ebtn) ebtn.addEventListener("click", function () { renderEditForm(c); });
    }

    function renderEditForm(c) {
      document.getElementById("sightings-panel").innerHTML = "";
      detail.innerHTML =
        '<div class="row g-4"><div class="col-lg-8">' +
        '<h4 class="mb-3">Edit case details</h4>' +
        '<div id="edit-msg"></div>' +
        '<div class="mb-3"><label class="form-label">Name</label>' +
        '<input id="e-name" class="form-control" value="' + esc(c.name || "") + '"></div>' +
        '<div class="mb-3"><label class="form-label">National ID</label>' +
        '<input id="e-nid" class="form-control" placeholder="XXXXX-XXXXXXX-X" value="' + esc(c.national_id || "") + '"></div>' +
        '<div class="mb-3"><label class="form-label">Last Known Location</label>' +
        '<input id="e-loc" class="form-control" value="' + esc(c.last_location || "") + '"></div>' +
        '<div class="mb-3"><label class="form-label">Identifiers / Physical Description</label>' +
        '<textarea id="e-ids" class="form-control" rows="3">' + esc(c.identifiers || "") + "</textarea></div>" +
        '<div class="row g-2 mb-3">' +
        '<div class="col-md-6"><label class="form-label">Alert phone</label>' +
        '<input id="e-phone" class="form-control" value="' + esc(c.reporter_phone || "") + '"></div>' +
        '<div class="col-md-6"><label class="form-label">Alert email</label>' +
        '<input id="e-email" class="form-control" value="' + esc(c.reporter_email || "") + '"></div></div>' +
        '<div class="d-flex gap-2">' +
        '<button id="save-case" class="btn-main"><span>Save changes</span></button>' +
        '<button id="cancel-edit" class="btn-main btn-line"><span>Cancel</span></button>' +
        "</div></div></div>";

      document.getElementById("cancel-edit").addEventListener("click", function () { load(); });
      document.getElementById("save-case").addEventListener("click", async function () {
        var btn = this, msg = document.getElementById("edit-msg");
        var payload = {
          name: document.getElementById("e-name").value.trim(),
          national_id: document.getElementById("e-nid").value.trim(),
          last_location: document.getElementById("e-loc").value.trim(),
          identifiers: document.getElementById("e-ids").value.trim(),
          reporter_phone: document.getElementById("e-phone").value.trim(),
          reporter_email: document.getElementById("e-email").value.trim(),
        };
        if (!payload.name) { msg.innerHTML = '<div class="alert alert-danger">Name cannot be empty.</div>'; return; }
        btn.disabled = true; btn.innerHTML = "<span>Saving…</span>";
        try {
          await LOCAITE.apiPut("/api/cases/" + c.id, payload);
          load();
        } catch (err) {
          msg.innerHTML = '<div class="alert alert-danger">' + esc(err.message) + "</div>";
          btn.disabled = false; btn.innerHTML = "<span>Save changes</span>";
        }
      });
    }

    function esc(v) {
      return String(v == null ? "" : v).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    function renderSightings(list) {
      var panel = document.getElementById("sightings-panel");
      if (!list || !list.length) { panel.innerHTML = ""; return; }

      // Most-recent sighting shown as a prominent alert banner at the top.
      var latest = list[0];
      var banner = "";
      if (latest.source === "camera") {
        banner =
          '<div class="sighting-alert p-3 mb-3">' +
          '<div class="fw-bold mb-1">🔔 Spotted on a live camera</div>' +
          "This person may have been detected on camera <strong>" + esc(latest.camera_source || "live feed") +
          "</strong> on " + new Date(latest.timestamp).toLocaleString() +
          ". <strong>Review the snapshot below to confirm it is the right person.</strong></div>";
      } else if (latest.new_location) {
        banner =
          '<div class="sighting-alert p-3 mb-3">' +
          '<div class="fw-bold mb-1">🔔 New possible sighting</div>' +
          "This person may have been spotted near <strong>" + esc(latest.new_location) +
          "</strong> on " + new Date(latest.timestamp).toLocaleString() +
          ", detected from a social-media post. <strong>Please review the image below to confirm it is the right person.</strong></div>";
      }

      var cards = list.map(function (s) {
        var imgs = (s.images && s.images.length)
          ? '<div class="d-flex flex-wrap gap-2 mt-2">' + s.images.map(function (u) {
              return '<img class="sighting-img" src="' + esc(u) + '" alt="matched image">';
            }).join("") + "</div>"
          : "";
        var when = new Date(s.timestamp).toLocaleString();

        if (s.source === "camera") {
          var conf = (s.confidence != null) ? ' <span class="text-muted-light small">(distance ' + esc(s.confidence) + ")</span>" : "";
          return (
            '<div class="sighting-card p-3 mb-2">' +
            '<div class="d-flex flex-wrap align-items-center">' +
            '<span><span class="badge bg-info me-2">📷 Camera</span>Detected on <strong>' + esc(s.camera_source || "live feed") + "</strong>" + conf + "</span>" +
            '<span class="text-muted-light small ms-auto">' + when + "</span>" +
            "</div>" + imgs + "</div>"
          );
        }

        var faceOk = s.face_match && /^Face match/i.test(s.face_match);
        var face = s.face_match
          ? '<span class="badge ' + (faceOk ? "bg-success" : "bg-secondary") + ' ms-2">' + esc(s.face_match) + "</span>"
          : "";
        var loc = s.new_location
          ? "Spotted near <strong>" + esc(s.new_location) + "</strong>"
          : "Photo submitted for review";
        var post = s.post_url ? ' · <a href="' + esc(s.post_url) + '" target="_blank" rel="noopener" class="text-info">view source post</a>' : "";
        return (
          '<div class="sighting-card p-3 mb-2">' +
          '<div class="d-flex flex-wrap align-items-center">' +
          '<span><span class="badge bg-secondary me-2">🌐 Social</span>' + loc + "</span>" + face +
          '<span class="text-muted-light small ms-auto">' + when + post + "</span>" +
          "</div>" + imgs +
          (s.new_location ? '<div class="text-muted-light small mt-2">Previous location: ' + esc(s.previous_location || "—") + " → now " + esc(s.new_location) + "</div>" : "") +
          "</div>"
        );
      }).join("");

      panel.innerHTML =
        '<h4 class="mb-3">Sightings &amp; Alerts</h4>' + banner + cards +
        '<p class="text-muted-light small mt-2">Sightings are auto-detected from social-media posts and are unverified. Compare the image above with the person you are looking for before acting on a location.</p>';
    }

    async function load() {
      try {
        var c = await LOCAITE.apiGet("/api/cases/" + id);
        render(c);
      } catch (err) {
        detail.innerHTML = '<div class="alert alert-danger">Case not found: ' + err.message + "</div>";
        return;
      }
      try {
        var sightings = await LOCAITE.apiGet("/api/cases/" + id + "/sightings");
        renderSightings(sightings);
      } catch (err) { /* sightings are optional; ignore if unavailable */ }
    }
    if (!id) detail.innerHTML = '<div class="alert alert-warning">No case id provided.</div>';
    else load();
  </script>
</body>
</html>
