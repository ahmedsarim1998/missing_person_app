<!DOCTYPE html>
<html lang="en">
<head>
  <title>Facebook Sightings - locAIte</title>
  <link rel="icon" href="images/icon.webp" type="image/gif" sizes="16x16">
  <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <link href="css/bootstrap.min.css" rel="stylesheet" type="text/css" id="bootstrap">
  <link href="css/plugins.css" rel="stylesheet" type="text/css">
  <link href="css/style.css" rel="stylesheet" type="text/css">
  <link id="colors" href="css/colors/scheme-1.css" rel="stylesheet" type="text/css">
</head>
<body>
  <div id="wrapper">
    <div id="site-header"></div>
    <div class="no-bottom no-top" id="content">
      <div id="top"></div>
      <section class="text-light" style="padding:160px 0 90px;background:var(--bg-dark-1);min-height:100vh">
        <div class="container">
          <div class="d-flex justify-content-between align-items-center flex-wrap mb-2">
            <div>
              <h2 class="mb-0">Facebook Sightings</h2>
              <p class="text-muted-light mb-0">Location updates auto-extracted from monitored Facebook posts. Auto-applied updates overwrite a case's last known location (and are reversible via the audit trail below).</p>
            </div>
            <div class="d-flex align-items-center">
              <div class="form-check form-switch me-3 text-light">
                <input class="form-check-input" type="checkbox" id="demo-toggle" checked>
                <label class="form-check-label" for="demo-toggle">Demo mode</label>
              </div>
              <button id="scan-btn" class="btn-main"><span>Scan Now</span></button>
            </div>
          </div>
          <div id="scan-result" class="mb-3"></div>
          <div id="sightings"><p>Loading…</p></div>
        </div>
      </section>
    </div>
    <div id="site-footer"></div>
  </div>

  <script src="js/plugins.js"></script>
  <script src="js/app.js"></script>
  <script src="js/designesia.js"></script>
  <script>
    if (LOCAITE.requireRole(["admin"])) {
      function row(s) {
        var applied = s.applied
          ? '<span class="badge bg-success">Applied</span>'
          : '<span class="badge bg-secondary">Logged</span>';
        var link = s.post_url ? '<a href="' + s.post_url + '" target="_blank" rel="noopener">view post</a>' : "—";
        return (
          "<tr>" +
          "<td>" + s.person_name + "</td>" +
          "<td>" + (s.match_score != null ? s.match_score : "—") + "</td>" +
          "<td>" + (s.previous_location || "—") + "</td>" +
          "<td>" + (s.new_location || "—") + "</td>" +
          "<td>" + applied + "</td>" +
          "<td>" + new Date(s.timestamp).toLocaleString() + "</td>" +
          "<td>" + link + "</td>" +
          "</tr>"
        );
      }
      async function load() {
        var host = document.getElementById("sightings");
        try {
          var list = await LOCAITE.apiGet("/api/admin/fb/sightings");
          if (!list.length) { host.innerHTML = '<p class="text-muted-light">No sightings recorded yet. Run a scan to populate.</p>'; return; }
          host.innerHTML =
            '<table class="table table-dark table-striped"><thead><tr>' +
            "<th>Person</th><th>Score</th><th>Previous</th><th>New Location</th><th>Status</th><th>Time</th><th>Post</th>" +
            "</tr></thead><tbody>" + list.map(row).join("") + "</tbody></table>";
        } catch (err) {
          host.innerHTML = '<div class="alert alert-danger">' + err.message + "</div>";
        }
      }
      document.getElementById("scan-btn").addEventListener("click", async function () {
        var btn = this, res = document.getElementById("scan-result");
        btn.disabled = true; btn.innerHTML = "<span>Scanning…</span>";
        try {
          var demo = document.getElementById("demo-toggle").checked;
          var s = await LOCAITE.apiPost("/api/admin/fb/scan", { demo: demo });
          res.innerHTML = '<div class="alert alert-success">Scan complete — scanned ' + s.scanned +
            ", matched " + s.matched + ", updated " + s.updated + ", skipped " + s.skipped + ".</div>";
          load();
        } catch (err) {
          res.innerHTML = '<div class="alert alert-danger">' + err.message + "</div>";
        } finally {
          btn.disabled = false; btn.innerHTML = "<span>Scan Now</span>";
        }
      });
      load();
    }
  </script>
</body>
</html>
