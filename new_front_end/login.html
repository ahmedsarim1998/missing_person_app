<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login - locAIte</title>
  <link rel="icon" href="images/icon.webp" type="image/gif" sizes="16x16">
  <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <link href="css/bootstrap.min.css" rel="stylesheet" type="text/css" id="bootstrap">
  <link href="css/plugins.css" rel="stylesheet" type="text/css">
  <link href="css/style.css" rel="stylesheet" type="text/css">
  <link id="colors" href="css/colors/scheme-1.css" rel="stylesheet" type="text/css">
</head>
<body>
  <div id="wrapper">
    <div id="site-header"></div>
    <div class="no-bottom no-top" id="content">
      <div id="top"></div>
      <section class="text-light" style="padding:160px 0 90px;background:var(--bg-dark-1);min-height:100vh">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8">
              <div class="p-4 rounded-1" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)">
                <h3 class="mb-3">Sign In</h3>
                <p class="text-muted-light mb-4">Access your locAIte account to report and track cases.</p>
                <div id="msg"></div>
                <form id="login-form">
                  <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                  </div>
                  <button type="submit" class="btn-main w-100"><span>Login</span></button>
                </form>
                <p class="mt-3 mb-0">No account? <a href="register.html">Register here</a></p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
    <div id="site-footer"></div>
  </div>

  <script src="js/plugins.js"></script>
  <script src="js/app.js"></script>
  <script src="js/designesia.js"></script>
  <script>
    function param(n){return new URLSearchParams(location.search).get(n);}
    document.getElementById("login-form").addEventListener("submit", async function (e) {
      e.preventDefault();
      var msg = document.getElementById("msg");
      msg.innerHTML = "";
      var f = e.target;
      try {
        var data = await LOCAITE.apiPost("/api/auth/login", {
          username: f.username.value.trim(),
          password: f.password.value,
        });
        LOCAITE.login(data);
        var next = param("next");
        window.location.href = next || (data.role === "admin" ? "dashboard.html" : "cases.html");
      } catch (err) {
        msg.innerHTML = '<div class="alert alert-danger">' + err.message + "</div>";
      }
    });
  </script>
</body>
</html>
