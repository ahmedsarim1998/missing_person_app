<!DOCTYPE html>
<html lang="en">
<head>
  <title>Missing Person Cases - locAIte</title>
  <link rel="icon" href="images/icon.webp" type="image/gif" sizes="16x16">
  <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <link href="css/bootstrap.min.css" rel="stylesheet" type="text/css" id="bootstrap">
  <link href="css/plugins.css" rel="stylesheet" type="text/css">
  <link href="css/style.css" rel="stylesheet" type="text/css">
  <link id="colors" href="css/colors/scheme-1.css" rel="stylesheet" type="text/css">
</head>
<body>
  <div id="wrapper">
    <div id="site-header"></div>
    <div class="no-bottom no-top" id="content">
      <div id="top"></div>
      <section class="text-light" style="padding:160px 0 90px;background:var(--bg-dark-1);min-height:100vh">
        <div class="container">
          <div class="d-flex justify-content-between align-items-center flex-wrap mb-4">
            <div>
              <h2 class="mb-0">Missing Person Directory</h2>
              <p class="text-muted-light mb-0">Browse reported cases. Click a card for full details.</p>
            </div>
            <div class="d-flex align-items-center">
              <input id="search" class="form-control me-2" placeholder="Search by name or location" style="min-width:220px">
              <select id="status-filter" class="form-control" style="min-width:140px">
                <option value="all">All</option>
                <option value="active">Active</option>
                <option value="solved">Solved</option>
              </select>
            </div>
          </div>
          <div id="cases-grid" class="row g-4"><p>Loading cases…</p></div>
        </div>
      </section>
    </div>
    <div id="site-footer"></div>
  </div>

  <script src="js/plugins.js"></script>
  <script src="js/app.js"></script>
  <script src="js/designesia.js"></script>
  <script>
    var allCases = [];
    function card(c) {
      var img = c.photo_path || "images/misc/placeholder.jpg";
      var badge = c.status === "solved"
        ? '<span class="badge bg-success">Solved</span>'
        : '<span class="badge bg-danger">Active</span>';
      return (
        '<div class="col-lg-3 col-md-6">' +
        '<a href="case.html?id=' + c.id + '" class="d-block text-light text-decoration-none">' +
        '<div class="rounded-1 overflow-hidden h-100" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)">' +
        '<div style="height:220px;background:#111 url(\'' + img + '\') center/cover no-repeat"></div>' +
        '<div class="p-3">' +
        '<div class="d-flex justify-content-between align-items-center"><h5 class="mb-1">' + (c.name || "Unknown") + "</h5>" + badge + "</div>" +
        '<p class="mb-1 small"><i class="icofont-location-pin id-color"></i> ' + (c.last_location || "Unknown location") + "</p>" +
        '<p class="mb-0 small text-muted-light">ID: ' + (c.national_id || "—") + "</p>" +
        "</div></div></a></div>"
      );
    }
    function render() {
      var q = document.getElementById("search").value.toLowerCase();
      var sf = document.getElementById("status-filter").value;
      var grid = document.getElementById("cases-grid");
      var list = allCases.filter(function (c) {
        var matchQ = !q || (c.name || "").toLowerCase().includes(q) || (c.last_location || "").toLowerCase().includes(q);
        var matchS = sf === "all" || c.status === sf;
        return matchQ && matchS;
      });
      grid.innerHTML = list.length ? list.map(card).join("") : '<p>No cases found.</p>';
    }
    (async function () {
      try {
        allCases = await LOCAITE.apiGet("/api/cases/");
        render();
      } catch (err) {
        document.getElementById("cases-grid").innerHTML =
          '<div class="alert alert-danger">Failed to load cases: ' + err.message + "</div>";
      }
    })();
    document.getElementById("search").addEventListener("input", render);
    document.getElementById("status-filter").addEventListener("change", render);
  </script>
</body>
</html>
